spring.application.name=api-gateway
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.mvc.routes[0].id=order-service
spring.cloud.gateway.mvc.routes[0].uri=lb://ORDER-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/orders/**

spring.cloud.gateway.mvc.routes[1].id=inventory-service
spring.cloud.gateway.mvc.routes[1].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/inventory/**

spring.cloud.gateway.mvc.routes[2].id=payment-service
spring.cloud.gateway.mvc.routes[2].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/payments/**

spring.cloud.gateway.mvc.routes[3].id=notification-service
spring.cloud.gateway.mvc.routes[3].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/notifications/**
